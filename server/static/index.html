<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Lifelong Ops Agent</title>
  <style>
    :root {
      --bg: #ffffff;
      --surface: #f7f7f7;
      --border: #d4d4d4;
      --text: #0a0a0a;
      --muted: #525252;
      --focus: #0a0a0a;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
      min-height: 100vh;
      font-size: 15px;
    }
    header {
      padding: 1rem 1.25rem;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 0.75rem 1.5rem;
    }
    .brand {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    header h1 {
      margin: 0;
      font-size: 1rem;
      font-weight: 600;
      letter-spacing: -0.02em;
    }
    .tag {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      border: 1px solid var(--border);
      padding: 0.15rem 0.45rem;
    }
    nav {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 0.35rem 0.75rem;
      font-size: 0.85rem;
    }
    nav a {
      color: var(--text);
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
    }
    nav a:hover { text-decoration: underline; text-underline-offset: 3px; }
    nav svg { flex-shrink: 0; opacity: 0.85; }
    .sep { color: var(--border); user-select: none; }
    main {
      max-width: 1100px;
      margin: 0 auto;
      padding: 1.25rem;
      display: grid;
      gap: 1rem;
      grid-template-columns: 1fr;
    }
    @media (min-width: 900px) {
      main { grid-template-columns: 1fr 1fr; }
      .span-2 { grid-column: span 2; }
    }
    .card {
      background: var(--bg);
      border: 1px solid var(--border);
      padding: 1rem 1.1rem;
    }
    .card h2 {
      margin: 0 0 0.75rem;
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      font-weight: 600;
      color: var(--muted);
    }
    label {
      display: block;
      font-size: 0.75rem;
      color: var(--muted);
      margin-bottom: 0.25rem;
    }
    input, textarea, select {
      width: 100%;
      padding: 0.5rem 0.6rem;
      border: 1px solid var(--border);
      background: var(--bg);
      color: var(--text);
      font-size: 0.875rem;
      margin-bottom: 0.65rem;
    }
    input:focus, textarea:focus, select:focus {
      outline: 2px solid var(--focus);
      outline-offset: 1px;
    }
    textarea { min-height: 72px; font-family: ui-monospace, "Cascadia Code", monospace; font-size: 0.8rem; }
    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.65rem;
    }
    @media (max-width: 640px) { .row { grid-template-columns: 1fr; } }
    button {
      cursor: pointer;
      border: 1px solid var(--text);
      padding: 0.45rem 0.9rem;
      font-size: 0.85rem;
      font-weight: 500;
      background: var(--text);
      color: var(--bg);
    }
    button:hover { opacity: 0.88; }
    button.secondary {
      background: var(--bg);
      color: var(--text);
      border-color: var(--border);
    }
    button.secondary:hover { border-color: var(--text); opacity: 1; }
    .btn-row { display: flex; flex-wrap: wrap; gap: 0.5rem; margin-top: 0.5rem; }
    pre {
      margin: 0;
      padding: 0.75rem;
      background: var(--surface);
      border: 1px solid var(--border);
      font-size: 0.72rem;
      overflow: auto;
      max-height: 320px;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .status {
      font-size: 0.8rem;
      padding: 0.35rem 0.6rem;
      border: 1px solid var(--border);
      display: inline-block;
    }
    .status.ok { border-color: var(--text); background: var(--surface); }
    .status.err { border-color: var(--text); background: #e8e8e8; }
  </style>
</head>
<body>
  <header>
    <div class="brand">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true">
        <rect x="3" y="4" width="18" height="16" rx="1" />
        <path d="M7 8h4M7 12h10M7 16h6" />
      </svg>
      <h1>Lifelong Ops Agent</h1>
      <span class="tag">OpenEnv</span>
    </div>
    <nav>
      <a href="/docs">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6M16 13H8M16 17H8M10 9H8"/></svg>
        API docs
      </a>
      <span class="sep">|</span>
      <a href="/api">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M4 6h16M4 12h16M4 18h7"/></svg>
        JSON
      </a>
      <span class="sep">|</span>
      <a href="/health">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>
        Health
      </a>
    </nav>
  </header>
  <main>
    <section class="card span-2">
      <h2>Session</h2>
      <div class="row">
        <div>
          <label for="seed">Seed</label>
          <input id="seed" type="number" value="42" />
        </div>
        <div>
          <label for="week">Start week</label>
          <input id="week" type="number" value="1" min="1" max="3" />
        </div>
      </div>
      <div class="btn-row">
        <button type="button" id="btn-reset">New episode</button>
        <button type="button" id="btn-state" class="secondary">Refresh world</button>
      </div>
      <p id="session-status" class="status" style="margin-top:0.75rem;display:none;"></p>
    </section>

    <section class="card">
      <h2>Current ticket</h2>
      <pre id="ticket-view">Call reset to load a ticket.</pre>
    </section>

    <section class="card">
      <h2>Observation</h2>
      <pre id="obs-view">—</pre>
    </section>

    <section class="card span-2">
      <h2>Step</h2>
      <div class="row">
        <div>
          <label for="sq">SearchKB query</label>
          <input id="sq" type="text" value="refund policy" />
          <button type="button" id="btn-kb">SearchKB</button>
        </div>
        <div>
          <label for="mk">WriteMemory key</label>
          <input id="mk" type="text" value="note_w1" />
          <label for="mv">Value</label>
          <textarea id="mv">Policy summary from UI.</textarea>
          <button type="button" id="btn-wm">WriteMemory</button>
        </div>
      </div>
      <div class="row">
        <div>
          <label for="rk">ReadMemory key</label>
          <input id="rk" type="text" value="note_w1" />
          <button type="button" id="btn-rm">ReadMemory</button>
        </div>
        <div>
          <label for="ans">Answer</label>
          <textarea id="ans" placeholder="Final reply (graded)"></textarea>
          <button type="button" id="btn-answer">Answer</button>
        </div>
      </div>
    </section>

    <section class="card span-2">
      <h2>Last step response</h2>
      <pre id="step-view">No step yet.</pre>
    </section>

    <section class="card span-2">
      <h2>World state</h2>
      <pre id="state-view">Use Refresh world.</pre>
    </section>
  </main>

  <script>
    const el = (id) => document.getElementById(id);

    function showStatus(ok, msg) {
      const s = el("session-status");
      s.style.display = "inline-block";
      s.className = "status " + (ok ? "ok" : "err");
      s.textContent = msg;
    }

    async function api(path, opts = {}) {
      const r = await fetch(path, {
        headers: { "Content-Type": "application/json", ...opts.headers },
        ...opts,
      });
      const text = await r.text();
      let data;
      try {
        data = text ? JSON.parse(text) : null;
      } catch {
        data = { raw: text };
      }
      if (!r.ok) {
        const err = new Error(data.detail ? JSON.stringify(data.detail) : r.statusText);
        err.status = r.status;
        err.body = data;
        throw err;
      }
      return data;
    }

    function pretty(obj) {
      return JSON.stringify(obj, null, 2);
    }

    el("btn-reset").addEventListener("click", async () => {
      try {
        const seed = parseInt(el("seed").value, 10) || 42;
        const week = parseInt(el("week").value, 10) || 1;
        const obs = await api("/reset", {
          method: "POST",
          body: JSON.stringify({ seed, week }),
        });
        el("obs-view").textContent = pretty(obs);
        el("ticket-view").textContent = pretty(obs.ticket || {});
        el("step-view").textContent = "Episode started.";
        showStatus(true, "Reset OK. Week " + obs.week + ", episode " + (obs.episode_id || "").slice(0, 8) + "…");
      } catch (e) {
        showStatus(false, "Reset failed: " + e.message);
      }
    });

    el("btn-state").addEventListener("click", async () => {
      try {
        const st = await api("/state");
        el("state-view").textContent = pretty(st);
        showStatus(true, "State loaded.");
      } catch (e) {
        showStatus(false, "State failed: " + e.message);
      }
    });

    async function doStep(action) {
      try {
        const res = await api("/step", {
          method: "POST",
          body: JSON.stringify({ action }),
        });
        el("step-view").textContent = pretty(res);
        el("obs-view").textContent = pretty(res.observation);
        if (res.observation && res.observation.ticket) {
          el("ticket-view").textContent = pretty(res.observation.ticket);
        }
        showStatus(true, "Step OK. Reward " + (res.reward && res.reward.value) + ", done=" + res.done);
      } catch (e) {
        el("step-view").textContent = pretty(e.body || { error: e.message });
        showStatus(false, "Step failed: " + e.message);
      }
    }

    el("btn-kb").addEventListener("click", () => {
      doStep({ type: "SearchKB", query: el("sq").value || "refund policy" });
    });
    el("btn-wm").addEventListener("click", () => {
      doStep({ type: "WriteMemory", key: el("mk").value, value: el("mv").value });
    });
    el("btn-rm").addEventListener("click", () => {
      doStep({ type: "ReadMemory", key: el("rk").value });
    });
    el("btn-answer").addEventListener("click", () => {
      doStep({ type: "Answer", text: el("ans").value || "" });
    });
  </script>
</body>
</html>
