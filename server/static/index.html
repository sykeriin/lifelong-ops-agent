<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Lifelong Ops Agent — Playground</title>
  <style>
    :root {
      --bg: #0f1419;
      --surface: #1a2332;
      --border: #2d3a4d;
      --text: #e7ecf3;
      --muted: #8b9cb3;
      --accent: #3d8bfd;
      --accent-dim: #2563c4;
      --success: #34d399;
      --warn: #fbbf24;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Segoe UI", system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
      min-height: 100vh;
    }
    header {
      padding: 1rem 1.25rem;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 0.75rem 1.5rem;
    }
    header h1 {
      margin: 0;
      font-size: 1.15rem;
      font-weight: 600;
    }
    header nav a {
      color: var(--accent);
      text-decoration: none;
      font-size: 0.9rem;
    }
    header nav a:hover { text-decoration: underline; }
    main {
      max-width: 1200px;
      margin: 0 auto;
      padding: 1.25rem;
      display: grid;
      gap: 1rem;
      grid-template-columns: 1fr;
    }
    @media (min-width: 900px) {
      main {
        grid-template-columns: 1fr 1fr;
      }
      .span-2 { grid-column: span 2; }
    }
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 1rem 1.1rem;
    }
    .card h2 {
      margin: 0 0 0.75rem;
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--muted);
    }
    label {
      display: block;
      font-size: 0.8rem;
      color: var(--muted);
      margin-bottom: 0.25rem;
    }
    input, textarea, select {
      width: 100%;
      padding: 0.5rem 0.65rem;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: var(--bg);
      color: var(--text);
      font-size: 0.9rem;
      margin-bottom: 0.65rem;
    }
    textarea { min-height: 72px; font-family: ui-monospace, monospace; font-size: 0.8rem; }
    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.65rem;
    }
    button {
      cursor: pointer;
      border: none;
      border-radius: 6px;
      padding: 0.5rem 1rem;
      font-size: 0.9rem;
      font-weight: 500;
      background: var(--accent);
      color: #fff;
    }
    button:hover { background: var(--accent-dim); }
    button.secondary {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text);
    }
    button.secondary:hover { border-color: var(--muted); }
    .btn-row { display: flex; flex-wrap: wrap; gap: 0.5rem; margin-top: 0.5rem; }
    pre {
      margin: 0;
      padding: 0.75rem;
      background: var(--bg);
      border-radius: 6px;
      border: 1px solid var(--border);
      font-size: 0.72rem;
      overflow: auto;
      max-height: 320px;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .status {
      font-size: 0.8rem;
      padding: 0.35rem 0.6rem;
      border-radius: 4px;
      display: inline-block;
    }
    .status.ok { background: rgba(52, 211, 153, 0.15); color: var(--success); }
    .status.err { background: rgba(248, 113, 113, 0.15); color: #f87171; }
    .pill {
      display: inline-block;
      font-size: 0.75rem;
      padding: 0.2rem 0.5rem;
      border-radius: 999px;
      background: var(--border);
      color: var(--muted);
      margin-right: 0.35rem;
    }
  </style>
</head>
<body>
  <header>
    <h1>Lifelong Ops Agent</h1>
    <span class="pill">OpenEnv HTTP API</span>
    <nav>
      <a href="/docs">Swagger</a>
      ·
      <a href="/">JSON root</a>
      ·
      <a href="/health">Health</a>
    </nav>
  </header>
  <main>
    <section class="card span-2">
      <h2>Session</h2>
      <div class="row">
        <div>
          <label for="seed">Seed</label>
          <input id="seed" type="number" value="42" />
        </div>
        <div>
          <label for="week">Start week</label>
          <input id="week" type="number" value="1" min="1" max="3" />
        </div>
      </div>
      <div class="btn-row">
        <button type="button" id="btn-reset">New episode (POST /reset)</button>
        <button type="button" id="btn-state" class="secondary">Refresh world (GET /state)</button>
      </div>
      <p id="session-status" class="status" style="margin-top:0.75rem;display:none;"></p>
    </section>

    <section class="card">
      <h2>Current ticket</h2>
      <pre id="ticket-view">Call /reset to load a ticket.</pre>
    </section>

    <section class="card">
      <h2>Observation</h2>
      <pre id="obs-view">—</pre>
    </section>

    <section class="card span-2">
      <h2>Step (POST /step)</h2>
      <div class="row">
        <div>
          <label for="sq">SearchKB query</label>
          <input id="sq" type="text" value="refund policy" />
          <button type="button" id="btn-kb">SearchKB</button>
        </div>
        <div>
          <label for="mk">WriteMemory key</label>
          <input id="mk" type="text" value="note_w1" />
          <label for="mv">Value</label>
          <textarea id="mv">Policy summary from UI demo.</textarea>
          <button type="button" id="btn-wm">WriteMemory</button>
        </div>
      </div>
      <div class="row">
        <div>
          <label for="rk">ReadMemory key</label>
          <input id="rk" type="text" value="note_w1" />
          <button type="button" id="btn-rm">ReadMemory</button>
        </div>
        <div>
          <label for="ans">Answer (ends episode)</label>
          <textarea id="ans" placeholder="Your support reply (graded 0–1)…"></textarea>
          <button type="button" id="btn-answer">Answer</button>
        </div>
      </div>
    </section>

    <section class="card span-2">
      <h2>Last step response</h2>
      <pre id="step-view">No step yet.</pre>
    </section>

    <section class="card span-2">
      <h2>World state snapshot</h2>
      <pre id="state-view">Click “Refresh world”.</pre>
    </section>
  </main>

  <script>
    const el = (id) => document.getElementById(id);

    function showStatus(ok, msg) {
      const s = el("session-status");
      s.style.display = "inline-block";
      s.className = "status " + (ok ? "ok" : "err");
      s.textContent = msg;
    }

    async function api(path, opts = {}) {
      const r = await fetch(path, {
        headers: { "Content-Type": "application/json", ...opts.headers },
        ...opts,
      });
      const text = await r.text();
      let data;
      try {
        data = text ? JSON.parse(text) : null;
      } catch {
        data = { raw: text };
      }
      if (!r.ok) {
        const err = new Error(data.detail ? JSON.stringify(data.detail) : r.statusText);
        err.status = r.status;
        err.body = data;
        throw err;
      }
      return data;
    }

    function pretty(obj) {
      return JSON.stringify(obj, null, 2);
    }

    el("btn-reset").addEventListener("click", async () => {
      try {
        const seed = parseInt(el("seed").value, 10) || 42;
        const week = parseInt(el("week").value, 10) || 1;
        const obs = await api("/reset", {
          method: "POST",
          body: JSON.stringify({ seed, week }),
        });
        el("obs-view").textContent = pretty(obs);
        el("ticket-view").textContent = pretty(obs.ticket || {});
        el("step-view").textContent = "Episode started — use actions above.";
        showStatus(true, "Reset OK — week " + obs.week + ", episode " + (obs.episode_id || "").slice(0, 8) + "…");
      } catch (e) {
        showStatus(false, "Reset failed: " + e.message);
      }
    });

    el("btn-state").addEventListener("click", async () => {
      try {
        const st = await api("/state");
        el("state-view").textContent = pretty(st);
        showStatus(true, "State loaded.");
      } catch (e) {
        showStatus(false, "State failed: " + e.message);
      }
    });

    async function doStep(action) {
      try {
        const res = await api("/step", {
          method: "POST",
          body: JSON.stringify({ action }),
        });
        el("step-view").textContent = pretty(res);
        el("obs-view").textContent = pretty(res.observation);
        if (res.observation && res.observation.ticket) {
          el("ticket-view").textContent = pretty(res.observation.ticket);
        }
        showStatus(true, "Step OK — reward " + (res.reward && res.reward.value) + ", done=" + res.done);
      } catch (e) {
        el("step-view").textContent = pretty(e.body || { error: e.message });
        showStatus(false, "Step failed: " + e.message);
      }
    }

    el("btn-kb").addEventListener("click", () => {
      doStep({ type: "SearchKB", query: el("sq").value || "refund policy" });
    });
    el("btn-wm").addEventListener("click", () => {
      doStep({ type: "WriteMemory", key: el("mk").value, value: el("mv").value });
    });
    el("btn-rm").addEventListener("click", () => {
      doStep({ type: "ReadMemory", key: el("rk").value });
    });
    el("btn-answer").addEventListener("click", () => {
      doStep({ type: "Answer", text: el("ans").value || "" });
    });
  </script>
</body>
</html>
